<style>
  .mode-landscape .sl-layout { flex-direction: row; }
  .mode-portrait .sl-layout { flex-direction: column; }

<section class="w-full h-full overflow-auto bg-white">
  <div class="sl-layout w-full h-full flex">

    <!-- Left: content -->
    <div class="sl-content flex flex-col justify-between p-12 bg-white">

        <h1 class="text-5xl font-black leading-tight text-slate-900 mb-5">

        </div>

            <span class="text-4xl font-black text-indigo-600">X</span>

          <div class="w-20 h-20 bg-white rounded-xl shadow flex items-center justify-center border-2 border-indigo-200">

          </div>

          </div>
          <!-- Row 2 -->
          <div class="w-20 h-20 bg-white rounded-xl shadow flex items-center justify-center border-2 border-indigo-200">
            <span class="text-4xl font-black text-rose-500">O</span>
          </div>
          <div class="w-20 h-20 bg-indigo-600 rounded-xl shadow flex items-center justify-center border-2 border-indigo-600">
            <span class="text-4xl font-black text-white">X</span>
          </div>
          <div class="w-20 h-20 bg-white rounded-xl shadow flex items-center justify-center border-2 border-indigo-200">
            <span class="text-4xl font-black text-rose-500">O</span>
          </div>

          <div class="w-20 h-20 bg-white rounded-xl shadow flex items-center justify-center border-2 border-indigo-200">
            <span class="text-4xl font-black text-rose-500">O</span>

            <span class="text-4xl font-black text-white">X</span>
          </div>

        <!-- Win label -->
        <div class="mt-4 bg-indigo-600 text-white text-sm font-bold px-5 py-2 rounded-full shadow">
